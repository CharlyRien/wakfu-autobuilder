// Conveyor packaging for the Compose Desktop front-end.
// Pulls the JVM, main class and runtime classpath straight from Gradle (Compose Desktop aware).
include "#!../gradlew -q printConveyorConfig"

gradle.project-name = wakfu-autobuilder

app {
    display-name = Wakfu-Autobuilder
    fsname = wakfu-autobuilder
    vcs-url = "https://github.com/CharlyRien/wakfu-autobuilder"
    icons = "src/main/resources/assets/logo.png"

    // Native installers for all three desktop OSes from a single JVM build.
    // Unsigned builds (no paid certificate): users bypass the OS gatekeeper on first launch.

    // Download site + auto-update feed. Kept here so the Compose app is release-ready; the CI
    // deploy workflow still targets the JavaFX :gui until the cutover, so this does not publish
    // automatically.
    site {
        theme = dark
        github {
            oauth-token = ${env.OAUTH_TOKEN}
            pages-branch = "gh-pages"
        }
    }

    mac.info-plist.LSMinimumSystemVersion = 11.0.0
}

conveyor.compatibility-level = 18
