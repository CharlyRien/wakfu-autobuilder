// CI-only Conveyor config for the multi-machine release (see .github/workflows/deploy.yml).
//
// WHY THIS EXISTS: Conveyor's single-host cross-build resolves Compose's Skiko for the *build host*
// only, so a one-runner build ships macOS/Linux Skiko inside the Windows/Linux installers and they
// crash. (On Gradle 9 + JDK 25 the per-machine Gradle recipe also can't be made to resolve — the
// Skiko awt/android variant ambiguity can't be fixed for Conveyor's detached configurations.)
//
// THE FIX: each OS is packaged on its OWN native runner (where compose.desktop.currentOs is correct),
// then this config recombines those prebuilt apps into the signed, auto-updating site WITHOUT
// rebuilding — so no cross-platform Gradle/Skiko resolution happens here.
//
// Each `*.inputs` below points at the artifact that the matching runner uploaded and the `site` job
// downloaded into ./artifacts/<name>/. Conveyor detects the prebuilt inputs and skips compilation.
//
// ⚠️ DRAFT — validate on the first `workflow_dispatch`. The exact prebuilt-input layout (a `make
// <os>-app` output dir vs. a packaged archive) may need adjusting once we see a real CI run.

include "conveyor.conf"

app {
    mac.aarch64.inputs = [ "artifacts/mac-aarch64" ]
    mac.amd64.inputs = [ "artifacts/mac-amd64" ]
    windows.amd64.inputs = [ "artifacts/windows-amd64" ]
    linux.amd64.glibc.inputs = [ "artifacts/linux-amd64" ]
}
