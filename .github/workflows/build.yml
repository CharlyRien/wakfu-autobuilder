name: Build

on:
    push:
    workflow_dispatch:
    workflow_call:
    schedule:
        # Nightly run of the heavy full-pool OR-Tools OPTIMAL proof tests (@Tag("slow")). They are excluded
        # from the per-push `test` task so every push/PR stays fast; 03:17 UTC keeps them off the critical path.
        -   cron: '17 3 * * *'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout project sources
                uses: actions/checkout@v7.0.0

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Verify everything is working fine (fast tests)
                run: ./gradlew test

    slow-tests:
        # The heavy full-pool OR-Tools proof tests burn large deterministic-time budgets (the two bare
        # free-solve proofs run the 1-worker deterministic protocol; the runes+subs guards run a short
        # search plus the certificate), so on a 2-core runner the nightly takes a while. Run them nightly +
        # on demand only, never on per-push CI. The det budgets are CAPS — a green proof returns as soon as
        # OPTIMAL lands — so the timeout below is a hang/regression backstop, not the expected runtime.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 240 # the pre-existing catalog no-bail proof alone runs ~1 h; the rest ~30 min
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout project sources
                uses: actions/checkout@v6.0.3

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Run the heavy full-pool proof tests
                run: ./gradlew :autobuilder:slowTest
